<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate BTD Map Editor</title>
    <style>
        :root { --bg: #1a1a1a; --panel: #2a2a2a; --accent: #4CAF50; --danger: #f44336; --warn: #ff9800; --text: #eee; --bg-tool: #9c27b0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .ui-panel { background: var(--panel); padding: 15px; border-bottom: 2px solid #444; display: flex; flex-direction: column; gap: 10px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .top-row { display: flex; gap: 15px; align-items: center; }
        textarea { flex: 1; height: 80px; background: #111; color: #0f0; border: 1px solid #555; padding: 10px; font-family: 'Consolas', monospace; font-size: 12px; border-radius: 4px; resize: none; }
        
        .controls { display: flex; flex-direction: column; gap: 8px; min-width: 250px; }
        button { padding: 8px 12px; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; color: white; transition: filter 0.2s; }
        button:hover { filter: brightness(1.2); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #renderBtn { background: var(--accent); }
        #exportBtn { background: #2196F3; }
        
        .editor-tools { display: flex; gap: 10px; align-items: center; background: #333; padding: 8px; border-radius: 6px; border: 1px solid #555; flex-wrap: wrap; }
        .tool-group { display: flex; gap: 10px; align-items: center; border-right: 2px solid #555; padding-right: 15px; margin-right: 5px; }
        .status { font-size: 14px; font-weight: bold; color: #ffeb3b; min-width: 130px; }
        
        .btn-add { background: #8BC34A; }
        .btn-del { background: var(--danger); }
        .btn-conv { background: var(--warn); }
        .btn-bg { background: var(--bg-tool); }
        .btn-branch { background: #00bcd4; }
        .btn-link { background: #673AB7; transition: background 0.2s; }
        .btn-clipboard { background: #e91e63; }

        #viewport-container { flex: 1; position: relative; background: #000; overflow: hidden; }
        canvas { display: block; cursor: crosshair; outline: none; }
        
        .instructions { font-size: 11px; color: #aaa; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <div class="top-row">
            <textarea id="codeInput" placeholder="Paste your AS3 Vector.<Tile> code here..."></textarea>
            <div class="controls">
                <button id="renderBtn" onclick="parseCode()">IMPORT MAP CODE</button>
                <button id="exportBtn" onclick="exportCode()">EXPORT AS3 CODE</button>
            </div>
        </div>
        
        <div class="editor-tools">
            <div class="status" id="selStatus">No Selection</div>
            
            <div class="tool-group">
                <button class="btn-add" onclick="addTile('s')">+ Straight</button>
                <button class="btn-add" onclick="addTile('a')">+ Arc</button>
            </div>

            <div class="tool-group" style="background: #1e3a5f; padding: 4px 10px; border-radius: 4px;">
                <button class="btn-clipboard" id="btnCopy" onclick="copySelected()" disabled>Copy (Ctrl+C)</button>
                <button class="btn-clipboard" id="btnPaste" onclick="pasteClipboard()" disabled>Paste (Ctrl+V)</button>
            </div>

            <div class="tool-group" style="background: #2a2a2a; padding: 4px 10px; border-radius: 4px;">
                <button class="btn-branch" id="btnBranch" onclick="branchPath()" disabled>Split Path (Add Spawns)</button>
                <button class="btn-link" id="btnLinkMode" onclick="toggleLinkMode()" disabled title="Click this, then click another tile to connect them">Link Tool</button>
                <label style="font-size: 11px; color: #ccc;">Next: <input type="text" id="propNext" style="width: 80px; background:#111; color:#fff; border:1px solid #555; padding:4px;" onchange="updateTileProps()" disabled></label>
                <label style="font-size:11px;color:#ccc;">Branch:
<select id="propBranch" onchange="updateTileProps()" disabled>
<option value="random">Random</option>
<option value="roundrobin">Round Robin</option>
<option value="fixed">Fixed</option>
</select></label>
            </div>
            
            <div class="tool-group">
                <button class="btn-conv" id="btnConv" onclick="convertSelected()" disabled>Swap Type</button>
                <button class="btn-conv" id="btnFlip" onclick="flipSelectedArc()" disabled>Flip Arc</button>
                <button class="btn-del" id="btnDel" onclick="deleteSelected()" disabled>Delete</button>
            </div>
            
            <label style="margin-left:auto; font-size: 12px; display:flex; align-items:center; gap:5px; cursor:pointer;">
                <input type="checkbox" id="snapNodes" checked> Snap Nodes (15px)
            </label>
        </div>

        <div class="editor-tools" style="background: #444; padding: 6px 15px;">
            <div style="font-size: 12px; color: #aaa; margin-right: 15px; font-weight:bold;">BACKGROUND:</div>
            <input type="file" id="bgInput" accept="image/*" style="display:none;">
            <button class="btn-bg" onclick="document.getElementById('bgInput').click()">Load Image</button>
            <label style="font-size: 12px; display:flex; align-items:center; gap:5px; cursor:pointer; margin-left: 10px;">
                <input type="checkbox" id="editBgMode"> Move/Resize Bg
            </label>
            <label style="font-size: 12px; display:flex; align-items:center; gap:5px; margin-left: 15px;">
                Opacity: <input type="range" id="bgOpacity" min="0.1" max="1" step="0.1" value="0.7" style="width: 80px;" oninput="draw()">
            </label>
        </div>

        <div class="instructions">Controls: <b>Shift+Drag</b> to Box Select | <b>Drag selection</b> to move group | Drag Background to Pan | Scroll to Zoom | Multi-path maps are auto-grouped on export.</div>
    </div>
    
    <div id="viewport-container"><canvas id="editorCanvas" tabindex="1"></canvas></div>

<script>
const canvas = document.getElementById('editorCanvas');
const ctx = canvas.getContext('2d');

let tiles = [];
let selectedTiles = new Set();
let clipboard = [];
let camera = { x: 300, y: 300, zoom: 0.8 };

let interaction = { 
    mode: null, 
    pointKey: null, 
    activeNodeTile: -1,
    lastP: {x:0, y:0},
    boxStart: null,
    boxEnd: null
};

let bgState = { img: null, x: 0, y: 0, scale: 1 };

document.getElementById('bgInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
            bgState.img = img;
            bgState.x = 400 - img.width / 2;
            bgState.y = 300 - img.height / 2;
            bgState.scale = 1;
            draw();
        }
        img.src = event.target.result;
    }
    reader.readAsDataURL(file);
    e.target.value = '';
});

// ---------------------------------------------------------
// UI & State Management
// ---------------------------------------------------------
function updateUI() {
    const count = selectedTiles.size;
    const hasSel = count > 0;
    const singleSel = count === 1;
    let firstSel = hasSel ? Array.from(selectedTiles)[0] : -1;
    
    document.getElementById('selStatus').innerText = hasSel ? `Selected: ${count} Tile(s)` : "No Selection";
    document.getElementById('selStatus').style.color = hasSel ? '#ffeb3b' : '#888';
    
    document.getElementById('btnDel').disabled = !hasSel;
    document.getElementById('btnConv').disabled = !hasSel;
    document.getElementById('btnCopy').disabled = !hasSel;
    document.getElementById('btnPaste').disabled = clipboard.length === 0;
    
    // Tools that only work on single selections
    document.getElementById('btnBranch').disabled = !singleSel;
    document.getElementById('btnLinkMode').disabled = !singleSel;
    
    const propNext = document.getElementById('propNext');
    propNext.disabled = !singleSel;
    document.getElementById('propBranch').disabled=!singleSel;
    
    if (singleSel) {
        propNext.value = tiles[firstSel].next.join(', ');
        document.getElementById('propBranch').value=tiles[firstSel].branchMode||'random';
    } else {
        propNext.value = "";
        if (interaction.mode === 'LINK') toggleLinkMode();
    }
    
    let allArcs = true;
    selectedTiles.forEach(idx => { if (tiles[idx].type !== 'a') allArcs = false; });
    document.getElementById('btnFlip').disabled = !hasSel || !allArcs;
}

function updateTileProps() {
    if (selectedTiles.size !== 1) return;
    const idx = Array.from(selectedTiles)[0];
    const val = document.getElementById('propNext').value;
    if (val.trim() === '') {
        tiles[idx].next = [];
    } else {
        tiles[idx].next = val.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
    }
    tiles[idx].branchMode=document.getElementById('propBranch')?document.getElementById('propBranch').value:'random';
    draw();
}

// ---------------------------------------------------------
// Clipboard Functions (Copy / Paste)
// ---------------------------------------------------------
function copySelected() {
    if (selectedTiles.size === 0) return;
    clipboard = Array.from(selectedTiles).map(idx => ({
        originalIdx: idx,
        tile: JSON.parse(JSON.stringify(tiles[idx]))
    }));
    updateUI();
}

function pasteClipboard() {
    if (clipboard.length === 0) return;
    
    let newSelection = new Set();
    let baseIdx = tiles.length;
    let indexMap = {};
    
    // Map original indices to their new pasted indices to preserve logical links inside the pasted group
    clipboard.forEach((c, i) => { indexMap[c.originalIdx] = baseIdx + i; });
    
    clipboard.forEach((c, i) => {
        let newTile = JSON.parse(JSON.stringify(c.tile)); 
        
        // Offset visually so it doesn't overlap exactly
        if (newTile.type === 's') {
            newTile.pts[0].x += 60; newTile.pts[0].y += 60;
            newTile.pts[1].x += 60; newTile.pts[1].y += 60;
        } else {
            newTile.c.x += 60; newTile.c.y += 60;
            newTile.s.x += 60; newTile.s.y += 60;
            newTile.e.x += 60; newTile.e.y += 60;
        }
        
        // Remap internal path links. Drop external links.
        newTile.next = (newTile.next || []).map(nxt => indexMap[nxt]).filter(n => n !== undefined);
        
        tiles.push(newTile);
        newSelection.add(baseIdx + i);
    });
    
    selectedTiles = newSelection;
    updateUI(); draw();
}

// ---------------------------------------------------------
// Tool Functions
// ---------------------------------------------------------
function addTile(type) {
    const cx = (canvas.width / 2 - camera.x) / camera.zoom;
    const cy = (canvas.height / 2 - camera.y) / camera.zoom;
    const size = 100;
    const template = { next: [], trans: "0", layer: "0", branchMode:'random' };

    if (type === 's') {
        tiles.push({ ...template, type: 's', pts: [{x: cx - size, y: cy}, {x: cx + size, y: cy}] });
    } else {
        tiles.push({ ...template, type: 'a', c: {x: cx, y: cy - size}, s: {x: cx - size, y: cy}, e: {x: cx + size, y: cy}, r: false });
    }
    
    selectedTiles = new Set([tiles.length - 1]);
    updateUI(); draw();
}

function deleteSelected() {
    if (selectedTiles.size === 0) return;
    
    // Sort descending so splicing doesn't mess up subsequent deletions
    let toDelete = Array.from(selectedTiles).sort((a, b) => b - a);
    
    toDelete.forEach(delIdx => {
        tiles.splice(delIdx, 1);
        tiles.forEach(t => {
            t.next = t.next.filter(idx => idx !== delIdx);
            t.next = t.next.map(idx => idx > delIdx ? idx - 1 : idx);
        });
    });
    
    selectedTiles.clear();
    updateUI(); draw();
}

function convertSelected() {
    if (selectedTiles.size === 0) return;
    selectedTiles.forEach(idx => {
        let t = tiles[idx];
        if (t.type === 's') {
            t.type = 'a'; t.s = t.pts[0]; t.e = t.pts[t.pts.length-1]; delete t.pts;
            t.c = { x: (t.s.x + t.e.x)/2 + 50, y: (t.s.y + t.e.y)/2 - 50 }; t.r = false;
        } else {
            t.type = 's'; t.pts = [t.s, t.e]; delete t.c; delete t.s; delete t.e; delete t.r;
        }
    });
    updateUI(); draw();
}

function flipSelectedArc() {
    selectedTiles.forEach(idx => {
        if (tiles[idx].type === 'a') tiles[idx].r = !tiles[idx].r;
    });
    draw();
}

function branchPath() {
    if (selectedTiles.size !== 1) return;
    let pIdx = Array.from(selectedTiles)[0];
    let parentTile = tiles[pIdx];
    
    let count = parseInt(prompt("How many branching spawn paths to create from this tile?", "4"));
    if (isNaN(count) || count < 2) return;
    
    let px = parentTile.type === 's' ? parentTile.pts[1].x : parentTile.e.x;
    let py = parentTile.type === 's' ? parentTile.pts[1].y : parentTile.e.y;
    
    const template = { next: [], trans: parentTile.trans, layer: parentTile.layer };
    
    for (let i = 0; i < count; i++) {
        let offset = (i - (count-1)/2) * 60;
        let nx = px + 80;
        let ny = py + offset;
        
        tiles.push({ ...template, type: 's', pts: [{x: px, y: py}, {x: nx, y: ny}] });
        parentTile.next.push(tiles.length - 1);
    }
    
    updateUI(); draw();
}

function toggleLinkMode() {
    const btn = document.getElementById('btnLinkMode');
    if (interaction.mode === 'LINK') {
        interaction.mode = null;
        btn.style.background = '#673AB7';
    } else {
        interaction.mode = 'LINK';
        btn.style.background = '#E91E63'; 
    }
}

// ---------------------------------------------------------
// Drawing Logic
// ---------------------------------------------------------
function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.translate(camera.x, camera.y);
    ctx.scale(camera.zoom, camera.zoom);

    if (bgState.img) {
        ctx.globalAlpha = document.getElementById('bgOpacity').value;
        ctx.drawImage(bgState.img, bgState.x, bgState.y, bgState.img.width * bgState.scale, bgState.img.height * bgState.scale);
        ctx.globalAlpha = 1.0;
    }

    ctx.strokeStyle = "rgba(255, 0, 0, 0.8)";
    ctx.lineWidth = 4 / camera.zoom;
    ctx.strokeRect(0, 0, 800, 600);
    ctx.fillStyle = "rgba(255, 0, 0, 0.8)";
    ctx.font = `bold ${16 / camera.zoom}px Arial`;
    ctx.fillText("Map Image Boundary (800x600)", 5, -10 / camera.zoom);

    ctx.strokeStyle = "rgba(51, 51, 51, 0.5)"; ctx.lineWidth = 1/camera.zoom;
    for(let i = -3000; i <= 3000; i += 100) {
        ctx.beginPath(); ctx.moveTo(i, -3000); ctx.lineTo(i, 3000); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-3000, i); ctx.lineTo(3000, i); ctx.stroke();
    }
    
    ctx.strokeStyle = "rgba(255, 255, 255, 0.5)"; ctx.lineWidth = 3/camera.zoom;
    ctx.beginPath(); ctx.moveTo(0, -3000); ctx.lineTo(0, 3000); ctx.stroke(); 
    ctx.beginPath(); ctx.moveTo(-3000, 0); ctx.lineTo(3000, 0); ctx.stroke(); 
    
    ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
    ctx.font = `${14/camera.zoom}px Consolas, monospace`;
    for(let i = -3000; i <= 3000; i += 200) {
        if(i !== 0) {
            ctx.fillText(i, i + 5, 18/camera.zoom); 
            ctx.fillText(i, 5, i - 5/camera.zoom); 
        }
    }
    ctx.fillText("(0, 0)", 5, -5/camera.zoom);

    ctx.setLineDash([8, 8]);
    ctx.lineWidth = 2 / camera.zoom;
    let singleIdx = selectedTiles.size === 1 ? Array.from(selectedTiles)[0] : -1;
    
    tiles.forEach((t, i) => {
        if (!t.next || t.next.length === 0) return;
        let ex = t.type === 's' ? t.pts[1].x : t.e.x;
        let ey = t.type === 's' ? t.pts[1].y : t.e.y;
        
        t.next.forEach(nxtIdx => {
            let nxtT = tiles[nxtIdx];
            if (!nxtT) return;
            let sx = nxtT.type === 's' ? nxtT.pts[0].x : nxtT.s.x;
            let sy = nxtT.type === 's' ? nxtT.pts[0].y : nxtT.s.y;
            
            ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(sx, sy);
            
            if (i === singleIdx) ctx.strokeStyle = '#ffeb3b';
            else if (nxtIdx === singleIdx) ctx.strokeStyle = '#4CAF50';
            else ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            
            ctx.stroke();

            let mx = (sx + ex) / 2, my = (sy + ey) / 2;
            let angle = Math.atan2(sy - ey, sx - ex);
            ctx.beginPath();
            ctx.moveTo(mx, my);
            ctx.lineTo(mx - Math.cos(angle - 0.5)*15/camera.zoom, my - Math.sin(angle - 0.5)*15/camera.zoom);
            ctx.lineTo(mx - Math.cos(angle + 0.5)*15/camera.zoom, my - Math.sin(angle + 0.5)*15/camera.zoom);
            ctx.closePath();
            ctx.fillStyle = ctx.strokeStyle;
            ctx.fill();
        });
    });
    ctx.setLineDash([]);

    const hitRadius = 8 / camera.zoom;
    tiles.forEach((t, i) => {
        const isSelected = selectedTiles.has(i);
        const isNextOfSelected = singleIdx !== -1 && tiles[singleIdx].next && tiles[singleIdx].next.includes(i);
        const isPrevOfSelected = singleIdx !== -1 && t.next && t.next.includes(singleIdx);
        
        if (isSelected) ctx.strokeStyle = '#ffffff';
        else if (isNextOfSelected) ctx.strokeStyle = '#ffeb3b';
        else if (isPrevOfSelected) ctx.strokeStyle = '#4CAF50';
        else ctx.strokeStyle = `hsl(${(i * 45) % 360}, 80%, 60%)`;
        
        ctx.lineWidth = isSelected ? 8 : 5;
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        
        if (t.type === 's') { 
            ctx.beginPath(); ctx.moveTo(t.pts[0].x, t.pts[0].y); ctx.lineTo(t.pts[1].x, t.pts[1].y); ctx.stroke();
        } else if (t.type === 'a') { 
            const rad = Math.hypot(t.s.x - t.c.x, t.s.y - t.c.y);
            const sa = Math.atan2(t.s.y - t.c.y, t.s.x - t.c.x);
            const ea = Math.atan2(t.e.y - t.c.y, t.e.x - t.c.x);
            let diff = (ea - sa) % (Math.PI * 2); if (diff < 0) diff += Math.PI * 2;
            ctx.beginPath(); ctx.arc(t.c.x, t.c.y, rad, sa, ea, (t.r !== (diff > Math.PI))); ctx.stroke();
            
            if (isSelected) {
                ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2 / camera.zoom;
                ctx.beginPath(); ctx.moveTo(t.c.x, t.c.y); ctx.lineTo(t.s.x, t.s.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(t.c.x, t.c.y); ctx.lineTo(t.e.x, t.e.y); ctx.stroke();
            }
        }

        if (isSelected) {
            const drawH = (x, y, color) => { 
                ctx.fillStyle = color; ctx.fillRect(x - hitRadius, y - hitRadius, hitRadius*2, hitRadius*2); 
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 1/camera.zoom; ctx.strokeRect(x - hitRadius, y - hitRadius, hitRadius*2, hitRadius*2); 
            };
            if (t.type === 's') { drawH(t.pts[0].x, t.pts[0].y, '#f44336'); drawH(t.pts[1].x, t.pts[1].y, '#f44336'); } 
            else { drawH(t.c.x, t.c.y, '#2196F3'); drawH(t.s.x, t.s.y, '#f44336'); drawH(t.e.x, t.e.y, '#f44336'); }
        }
    });

    // Draw Selection Box
    if (interaction.mode === 'BOX_SELECT' && interaction.boxStart && interaction.boxEnd) {
        ctx.fillStyle = 'rgba(33, 150, 243, 0.2)';
        ctx.strokeStyle = '#2196F3';
        ctx.lineWidth = 1 / camera.zoom;
        let w = interaction.boxEnd.x - interaction.boxStart.x;
        let h = interaction.boxEnd.y - interaction.boxStart.y;
        ctx.fillRect(interaction.boxStart.x, interaction.boxStart.y, w, h);
        ctx.strokeRect(interaction.boxStart.x, interaction.boxStart.y, w, h);
    }
}

// ---------------------------------------------------------
// Mouse Logic
// ---------------------------------------------------------

function checkTileHit(t, mx, my, hitR) {
    if (t.type === 's') {
        const l2 = Math.pow(t.pts[0].x - t.pts[1].x, 2) + Math.pow(t.pts[0].y - t.pts[1].y, 2);
        if (l2 === 0) return Math.hypot(mx - t.pts[0].x, my - t.pts[0].y) < hitR;
        let t_val = ((mx - t.pts[0].x) * (t.pts[1].x - t.pts[0].x) + (my - t.pts[0].y) * (t.pts[1].y - t.pts[0].y)) / l2;
        t_val = Math.max(0, Math.min(1, t_val));
        const px = t.pts[0].x + t_val * (t.pts[1].x - t.pts[0].x);
        const py = t.pts[0].y + t_val * (t.pts[1].y - t.pts[0].y);
        return Math.hypot(px - mx, py - my) < hitR;
    } else if (t.type === 'a') {
        const r = Math.hypot(t.s.x - t.c.x, t.s.y - t.c.y);
        const distToCenter = Math.hypot(mx - t.c.x, my - t.c.y);
        
        if (Math.abs(distToCenter - r) < hitR) {
            const sa = Math.atan2(t.s.y - t.c.y, t.s.x - t.c.x);
            const ea = Math.atan2(t.e.y - t.c.y, t.e.x - t.c.x);
            let diff = (ea - sa) % (Math.PI * 2); if (diff < 0) diff += Math.PI * 2;
            let ccw = (t.r !== (diff > Math.PI));
            
            const PI2 = Math.PI * 2;
            let t_angle = (Math.atan2(my - t.c.y, mx - t.c.x) % PI2 + PI2) % PI2;
            let s = (sa % PI2 + PI2) % PI2;
            let e = (ea % PI2 + PI2) % PI2;
            
            if (ccw) {
                if (s >= e) return t_angle <= s && t_angle >= e;
                return t_angle <= s || t_angle >= e;
            } else {
                if (s <= e) return t_angle >= s && t_angle <= e;
                return t_angle >= s || t_angle <= e;
            }
        }
    }
    return false;
}

function getTileAt(mx, my, hitR) {
    for (let idx of selectedTiles) { if (checkTileHit(tiles[idx], mx, my, hitR)) return idx; }
    for (let i = tiles.length - 1; i >= 0; i--) {
        if (!selectedTiles.has(i) && checkTileHit(tiles[i], mx, my, hitR)) return i;
    }
    return -1;
}

function getNodeAt(mx, my, hitR) {
    for (let idx of selectedTiles) {
        const t = tiles[idx];
        const pts = t.type === 's' ? { p0: t.pts[0], p1: t.pts[1] } : { c: t.c, s: t.s, e: t.e };
        for (let key in pts) { if (Math.hypot(pts[key].x - mx, pts[key].y - my) < hitR) return { index: idx, key: key }; }
    }
    for (let i = tiles.length - 1; i >= 0; i--) {
        if (selectedTiles.has(i)) continue;
        const t = tiles[i];
        const pts = t.type === 's' ? { p0: t.pts[0], p1: t.pts[1] } : { c: t.c, s: t.s, e: t.e };
        for (let key in pts) { if (Math.hypot(pts[key].x - mx, pts[key].y - my) < hitR) return { index: i, key: key }; }
    }
    return null;
}

function getTilesInBox(x1, y1, x2, y2) {
    let minX = Math.min(x1, x2), maxX = Math.max(x1, x2);
    let minY = Math.min(y1, y2), maxY = Math.max(y1, y2);
    let result = [];
    tiles.forEach((t, i) => {
        let inBox = false;
        if (t.type === 's') {
            if (t.pts[0].x >= minX && t.pts[0].x <= maxX && t.pts[0].y >= minY && t.pts[0].y <= maxY) inBox = true;
            if (t.pts[1].x >= minX && t.pts[1].x <= maxX && t.pts[1].y >= minY && t.pts[1].y <= maxY) inBox = true;
        } else {
            if (t.c.x >= minX && t.c.x <= maxX && t.c.y >= minY && t.c.y <= maxY) inBox = true;
            if (t.s.x >= minX && t.s.x <= maxX && t.s.y >= minY && t.s.y <= maxY) inBox = true;
            if (t.e.x >= minX && t.e.x <= maxX && t.e.y >= minY && t.e.y <= maxY) inBox = true;
        }
        if (inBox) result.push(i);
    });
    return result;
}

canvas.onmousedown = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left - camera.x) / camera.zoom;
    const my = (e.clientY - rect.top - camera.y) / camera.zoom;
    const hitR = 12 / camera.zoom;

    if (e.shiftKey && !document.getElementById('editBgMode').checked) {
        interaction.mode = 'BOX_SELECT';
        interaction.boxStart = {x: mx, y: my};
        interaction.boxEnd = {x: mx, y: my};
        return;
    }

    if (document.getElementById('editBgMode').checked && bgState.img) {
        interaction.mode = 'DRAG_BG'; interaction.lastP = { x: e.clientX, y: e.clientY }; return; 
    }

    if (interaction.mode === 'LINK' && selectedTiles.size === 1) {
        let targetIdx = getTileAt(mx, my, hitR);
        let srcIdx = Array.from(selectedTiles)[0];
        if (targetIdx !== -1 && targetIdx !== srcIdx) {
            let nxtArr = tiles[srcIdx].next;
            if (nxtArr.includes(targetIdx)) nxtArr.splice(nxtArr.indexOf(targetIdx), 1); 
            else nxtArr.push(targetIdx); 
            updateUI(); draw();
            return;
        }
        interaction.mode = null; 
        document.getElementById('btnLinkMode').style.background = '#673AB7';
    }

    interaction.mode = null;

    let clickedNode = getNodeAt(mx, my, hitR);
    if (clickedNode) {
        if (!selectedTiles.has(clickedNode.index)) selectedTiles = new Set([clickedNode.index]);
        interaction.activeNodeTile = clickedNode.index;
        interaction.mode = 'NODE';
        interaction.pointKey = clickedNode.key;
        updateUI(); draw();
        return;
    }

    let newSelection = getTileAt(mx, my, hitR);
    if (newSelection !== -1) {
        if (!selectedTiles.has(newSelection)) {
            if (e.shiftKey) selectedTiles.add(newSelection);
            else selectedTiles = new Set([newSelection]);
        }
        interaction.mode = 'MOVE_TILES';
        interaction.lastP = { x: mx, y: my };
        updateUI(); draw();
    } else {
        interaction.mode = 'PAN'; interaction.lastP = { x: e.clientX, y: e.clientY };
        selectedTiles.clear(); updateUI(); draw();
    }
};

window.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    let mx = (e.clientX - rect.left - camera.x) / camera.zoom;
    let ny = (e.clientY - rect.top - camera.y) / camera.zoom;

    if (interaction.mode === 'BOX_SELECT') {
        interaction.boxEnd = {x: mx, y: ny};
        draw();
    } else if (interaction.mode === 'DRAG_BG') {
        bgState.x += (e.clientX - interaction.lastP.x) / camera.zoom;
        bgState.y += (e.clientY - interaction.lastP.y) / camera.zoom;
        interaction.lastP = { x: e.clientX, y: e.clientY }; draw();
    } else if (interaction.mode === 'MOVE_TILES') {
        let dx = mx - interaction.lastP.x;
        let dy = ny - interaction.lastP.y;
        selectedTiles.forEach(idx => {
            let t = tiles[idx];
            if (t.type === 's') {
                t.pts[0].x += dx; t.pts[0].y += dy;
                t.pts[1].x += dx; t.pts[1].y += dy;
            } else {
                t.c.x += dx; t.c.y += dy;
                t.s.x += dx; t.s.y += dy;
                t.e.x += dx; t.e.y += dy;
            }
        });
        interaction.lastP = { x: mx, y: ny };
        draw();
    } else if (interaction.mode === 'NODE' && interaction.activeNodeTile !== -1) {
        if (document.getElementById('snapNodes').checked && interaction.pointKey !== 'c') {
            const snapR = 15 / camera.zoom;
            for (let i = 0; i < tiles.length; i++) {
                if (i === interaction.activeNodeTile) continue;
                const other = tiles[i];
                const opts = other.type === 's' ? [other.pts[0], other.pts[1]] : [other.s, other.e];
                for (let op of opts) {
                    if (Math.hypot(op.x - mx, op.y - ny) < snapR) { mx = op.x; ny = op.y; break; }
                }
            }
        }
        const t = tiles[interaction.activeNodeTile];
        if (t.type === 's') t.pts[interaction.pointKey === 'p0' ? 0 : 1] = {x: mx, y: ny};
        else t[interaction.pointKey] = {x: mx, y: ny};
        draw();
    } else if (interaction.mode === 'PAN') {
        camera.x += (e.clientX - interaction.lastP.x); camera.y += (e.clientY - interaction.lastP.y);
        interaction.lastP = { x: e.clientX, y: e.clientY }; draw();
    }
};

window.onmouseup = (e) => { 
    if (interaction.mode === 'BOX_SELECT' && interaction.boxStart && interaction.boxEnd) {
        let boxed = getTilesInBox(interaction.boxStart.x, interaction.boxStart.y, interaction.boxEnd.x, interaction.boxEnd.y);
        if (!e.shiftKey) selectedTiles.clear();
        boxed.forEach(idx => selectedTiles.add(idx));
        updateUI();
    }
    if(interaction.mode !== 'LINK') interaction.mode = null; 
    draw();
}

window.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
    
    // Copy Paste Hotkeys
    if (e.ctrlKey || e.metaKey) {
        if (e.key === 'c' || e.key === 'C') copySelected();
        if (e.key === 'v' || e.key === 'V') pasteClipboard();
        if (e.key === 'a' || e.key === 'A') {
            e.preventDefault();
            tiles.forEach((_, i) => selectedTiles.add(i));
            updateUI(); draw();
        }
    }
});

canvas.onwheel = (e) => { 
    if (document.getElementById('editBgMode').checked && bgState.img) {
        let oldScale = bgState.scale;
        bgState.scale *= (e.deltaY > 0 ? 0.95 : 1.05);
        bgState.x = (bgState.x + (bgState.img.width * oldScale) / 2) - (bgState.img.width * bgState.scale) / 2;
        bgState.y = (bgState.y + (bgState.img.height * oldScale) / 2) - (bgState.img.height * bgState.scale) / 2;
    } else { camera.zoom *= (e.deltaY > 0 ? 0.9 : 1.1); }
    draw(); e.preventDefault(); 
};

// ---------------------------------------------------------
// AS3 Importer / Exporter - WITH MULTI-PATH SUPPORT
// ---------------------------------------------------------
const getVec = (block, key) => {
    const match = block.match(new RegExp(key + "\\s*\\(\\s*new\\s+Vector2\\s*\\(\\s*(-?\\d+\\.?\\d*)\\s*,\\s*(-?\\d+\\.?\\d*)\\s*\\)", "i"));
    return match ? { x: parseFloat(match[1]), y: parseFloat(match[2]) } : null;
};

function parseNextTiles(str) {
    if (!str) return [];
    const match = str.match(/\[(.*?)\]/);
    if (match && match[1].trim() !== '') return match[1].split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));
    return [];
}

function parseCode() {
    const raw = document.getElementById('codeInput').value;
    tiles = []; selectedTiles.clear(); updateUI();
    
    const pathMatches = raw.split(/Vector\.<Tile>\(\s*\[/g);
    let indexOffset = 0;
    const chunksToProcess = pathMatches.length > 1 ? pathMatches.slice(1) : [raw];

    chunksToProcess.forEach(pathStr => {
        const chunks = pathStr.split(/new\s+(StraightTile|ArcTile)/g);
        let tilesInThisPath = 0;
        
        for (let i = 1; i < chunks.length; i += 2) {
            const type = chunks[i], content = chunks[i+1];
            const nextM = content.match(/\.ini_nextTileIndices\(([^)]*\[.*?\][^)]*)\)/) || content.match(/\.ini_nextTileIndices\((.*?)\)/);
            const transM = content.match(/\.ini_transitionType\((\d+)\)/);
            const layerM = content.match(/\.ini_layer\((\d+)\)/);
            
            let md = { 
                next: nextM ? parseNextTiles(nextM[1]).map(n => n + indexOffset) : [], 
                trans: transM ? transM[1] : "0", 
                layer: layerM ? layerM[1] : "0" 
            };

            if (type === "StraightTile") {
                const s = getVec(content, "ini_startPoint"), e = getVec(content, "ini_endPoint");
                if (s && e) { tiles.push({ ...md, type: 's', pts: [s, e] }); tilesInThisPath++; }
            } else if (type === "ArcTile") {
                const c = getVec(content, "ini_baseCentre"), s = getVec(content, "ini_baseStart"), e = getVec(content, "ini_baseEnd");
                if (c && s && e) { tiles.push({ ...md, type: 'a', c, s, e, r: content.toLowerCase().includes("reflex(true)") }); tilesInThisPath++; }
            }
        }
        indexOffset += tilesInThisPath;
    });
    draw();
}

function exportCode() {
    let paths = [];
    let visited = new Set();
    let connections = tiles.map(() => []);
    
    tiles.forEach((t, i) => {
        if(t.next) {
            t.next.forEach(nxt => {
                connections[i].push(nxt);
                if (connections[nxt]) connections[nxt].push(i);
            });
        }
    });

    for (let i = 0; i < tiles.length; i++) {
        if (!visited.has(i)) {
            let currentPath = [];
            let queue = [i];
            visited.add(i);

            while(queue.length > 0) {
                let curr = queue.shift();
                currentPath.push(curr);
                connections[curr].forEach(neighbor => {
                    if (!visited.has(neighbor)) {
                        visited.add(neighbor);
                        queue.push(neighbor);
                    }
                });
            }
            currentPath.sort((a,b) => a-b);
            paths.push(currentPath);
        }
    }

    let pathStrings = paths.map(pathIndices => {
        let localIndices = {};
        pathIndices.forEach((globalIdx, localIdx) => { localIndices[globalIdx] = localIdx; });

        let out = pathIndices.map(globalIdx => {
            let t = tiles[globalIdx];
            let localNext = (t.next || []).map(n => localIndices[n]).filter(n => n !== undefined);
            
            let str = t.type === 's' 
                ? `new StraightTile().ini_startPoint(new Vector2(${t.pts[0].x.toFixed(2)},${t.pts[0].y.toFixed(2)})).ini_endPoint(new Vector2(${t.pts[1].x.toFixed(2)},${t.pts[1].y.toFixed(2)}))`
                : `new ArcTile().ini_baseCentre(new Vector2(${t.c.x.toFixed(2)},${t.c.y.toFixed(2)})).ini_baseStart(new Vector2(${t.s.x.toFixed(2)},${t.s.y.toFixed(2)})).ini_baseEnd(new Vector2(${t.e.x.toFixed(2)},${t.e.y.toFixed(2)}))`;
            
            return str + `.ini_nextTileIndices(Vector.<int>([${localNext.join(",")}])).ini_transitionType(${t.trans}).ini_layer(${t.layer})`;
        });
        return `Vector.<Tile>([${out.join(",")}])`;
    });

    if(pathStrings.length === 0) pathStrings = ["Vector.<Tile>([])"];
    document.getElementById('codeInput').value = `tileSets = Vector.<Vector.<Tile>>([${pathStrings.join(",\n")}]);`;
}

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight - 220; draw(); };
window.onresize();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ActionScript Visualizer - Precision Alignment</title>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .ui-panel { background: #2a2a2a; padding: 15px; border-bottom: 2px solid #444; display: flex; gap: 15px; z-index: 10; }
        textarea { flex: 1; height: 80px; background: #111; color: #0f0; border: 1px solid #555; padding: 8px; font-family: monospace; font-size: 11px; }
        .controls { display: flex; flex-direction: column; gap: 8px; min-width: 280px; }
        button { padding: 8px; background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button.snap { background: #007acc; } /* Blue for alignment */
        #viewport-container { flex: 1; position: relative; background: #000; overflow: hidden; }
        canvas { display: block; cursor: crosshair; }
        #coord-hud { 
            position: absolute; bottom: 20px; right: 20px; 
            background: rgba(0,0,0,0.8); color: #0f0; 
            padding: 10px; border-radius: 5px; border: 1px solid #444;
            font-family: monospace; font-size: 14px; pointer-events: none;
        }
        .slider-box { font-size: 11px; color: #aaa; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <textarea id="codeInput" placeholder="Paste ActionScript code here..."></textarea>
        <div class="controls">
            <button id="renderBtn">RENDER TILES</button>
            <div style="border-top: 1px solid #444; padding-top: 5px;">
                <input type="file" id="imageLoader" accept="image/*" style="font-size: 10px; width: 100%;">
                <div class="slider-box">Alpha <input type="range" id="imgAlpha" min="0" max="1" step="0.1" value="0.5"></div>
                <div class="slider-box">Scale <input type="range" id="imgScale" min="0.01" max="10" step="0.01" value="1"></div>
                <button class="snap" id="snapBtn">SNAP IMAGE TO (349.63, 262.33)</button>
            </div>
        </div>
    </div>
    
    <div id="viewport-container">
        <canvas id="tileCanvas"></canvas>
        <div id="coord-hud">X: 0.00 | Y: 0.00</div>
    </div>

<script>
const canvas = document.getElementById('tileCanvas');
const ctx = canvas.getContext('2d');
const coordHud = document.getElementById('coord-hud');

let tiles = [];
let camera = { x: 0, y: 0, zoom: 1 };
let overlayImg = null;
let imgOffset = { x: 0, y: 0 };

/** * SNAP FUNCTION */
document.getElementById('snapBtn').onclick = () => {
    // This moves the image center specifically to your requested coordinates
    imgOffset.x = 349.63;
    imgOffset.y = 262.33;
    draw();
};

/** * PARSER */
function parseCode() {
    const rawText = document.getElementById('codeInput').value.replace(/\s+/g, ' ');
    const results = [];
    const chunks = rawText.split(/new\s+(StraightTile|ArcTile)/g);
    for (let i = 1; i < chunks.length; i += 2) {
        const type = chunks[i], content = chunks[i + 1];
        const vecRegex = /Vector2\s*\(\s*(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)\s*\)/g;
        const pts = []; let m;
        while ((m = vecRegex.exec(content)) !== null) pts.push({ x: parseFloat(m[1]), y: parseFloat(m[2]) });
        const isReflex = content.includes("ini_reflex(true)");
        if (type === "StraightTile" && pts.length >= 2) results.push({ type:'s', p1:pts[0], p2:pts[1] });
        else if (type === "ArcTile" && pts.length >= 3) results.push({ type:'a', c:pts[0], s:pts[1], e:pts[2], r:isReflex });
    }
    return results;
}

/** * RENDERER */
function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.translate(canvas.width/2 + camera.x, canvas.height/2 + camera.y);
    ctx.scale(camera.zoom, camera.zoom);

    if (overlayImg && overlayImg.complete) {
        ctx.save();
        ctx.globalAlpha = document.getElementById('imgAlpha').value;
        const s = parseFloat(document.getElementById('imgScale').value);
        // Image is rendered centered at imgOffset
        ctx.translate(imgOffset.x, imgOffset.y);
        ctx.scale(s, s);
        ctx.drawImage(overlayImg, -overlayImg.width/2, -overlayImg.height/2);
        ctx.restore();
    }

    // Grid
    ctx.strokeStyle = "#333";
    ctx.lineWidth = 1/camera.zoom;
    for(let i = -5000; i <= 5000; i+= 100) {
        ctx.beginPath(); ctx.moveTo(i, -5000); ctx.lineTo(i, 5000); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-5000, i); ctx.lineTo(5000, i); ctx.stroke();
    }

    // Tiles
    tiles.forEach((t, i) => {
        ctx.strokeStyle = `hsl(${(i * 30) % 360}, 80%, 60%)`;
        ctx.lineWidth = 5 / camera.zoom;
        ctx.beginPath();
        if (t.type === 's') { ctx.moveTo(t.p1.x, t.p1.y); ctx.lineTo(t.p2.x, t.p2.y); }
        else {
            const rad = Math.hypot(t.s.x - t.c.x, t.s.y - t.c.y);
            const sa = Math.atan2(t.s.y - t.c.y, t.s.x - t.c.x);
            const ea = Math.atan2(t.e.y - t.c.y, t.e.x - t.c.x);
            ctx.arc(t.c.x, t.c.y, rad, sa, ea, t.r);
        }
        ctx.stroke();
    });
}

/** * INPUTS & CAMERA */
canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    const worldX = (mouseX - canvas.width/2 - camera.x) / camera.zoom;
    const worldY = (mouseY - canvas.height/2 - camera.y) / camera.zoom;
    coordHud.innerText = `X: ${worldX.toFixed(2)} | Y: ${worldY.toFixed(2)}`;

    if (isDown) {
        const dx = e.clientX - lastP.x;
        const dy = e.clientY - lastP.y;
        if (e.shiftKey) { 
            imgOffset.x += dx/camera.zoom; 
            imgOffset.y += dy/camera.zoom; 
        } else { 
            camera.x += dx; 
            camera.y += dy; 
        }
        lastP = {x:e.clientX, y:e.clientY};
        draw();
    }
};

document.getElementById('renderBtn').onclick = () => {
    tiles = parseCode();
    draw();
};

document.getElementById('imageLoader').onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const tempImg = new Image();
    tempImg.onload = () => { overlayImg = tempImg; draw(); URL.revokeObjectURL(url); };
    tempImg.src = url;
};

document.getElementById('imgAlpha').oninput = draw;
document.getElementById('imgScale').oninput = draw;

let isDown = false, lastP = {x:0, y:0};
canvas.onmousedown = (e) => { isDown = true; lastP = {x:e.clientX, y:e.clientY}; };
window.onmouseup = () => isDown = false;
canvas.onwheel = (e) => { camera.zoom *= (e.deltaY > 0 ? 0.9 : 1.1); draw(); e.preventDefault(); };

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 130;
    draw();
}
window.onresize = resize;
resize();
</script>
</body>
</html>

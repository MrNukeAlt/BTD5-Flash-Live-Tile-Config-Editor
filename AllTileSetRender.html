<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Visualizer - Custom Snap & Save</title>
    <style>
        :root { --panel-bg: #2a2a2a; --accent: #4CAF50; --snap-blue: #007acc; --save-gold: #c9a01c; --text: #eee; }
        body { background: #1a1a1a; color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .ui-panel { background: var(--panel-bg); padding: 15px; border-bottom: 2px solid #444; display: flex; gap: 20px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        textarea { flex: 1; height: 110px; background: #111; color: #0f0; border: 1px solid #555; padding: 10px; font-family: 'Consolas', monospace; font-size: 12px; border-radius: 4px; resize: none; }
        
        .controls { display: flex; flex-direction: column; gap: 8px; min-width: 360px; }
        button { padding: 8px; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; color: white; transition: filter 0.2s; }
        button:hover { filter: brightness(1.2); }
        
        #renderBtn { background: var(--accent); font-size: 14px; margin-bottom: 5px; }
        .preset-row { display: flex; gap: 5px; }
        #saveBtn { background: var(--save-gold); flex: 1; }
        #snapBtn { background: var(--snap-blue); flex: 2; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #222; padding: 10px; border-radius: 4px; border: 1px solid #444; margin-top: 5px; }
        .slider-box { display: flex; flex-direction: column; gap: 2px; font-size: 11px; color: #aaa; }
        .check-row { grid-column: span 2; display: flex; justify-content: space-between; font-size: 11px; align-items: center; border-top: 1px solid #333; pt: 5px; margin-top: 5px; padding-top: 5px;}
        
        #viewport-container { flex: 1; position: relative; background: #000; overflow: hidden; }
        canvas { display: block; cursor: crosshair; }
        
        #coord-hud { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.85); color: #0f0; padding: 15px; border-radius: 8px; border: 1px solid #444; font-family: monospace; font-size: 12px; pointer-events: none; }
        .hud-line { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 4px; }
        .saved-coord { color: var(--save-gold); font-size: 10px; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <textarea id="codeInput" placeholder="// Paste Vector.<Tile> code here..."></textarea>
        
        <div class="controls">
            <button id="renderBtn">RENDER TILES</button>
            
            <div class="preset-row">
                <button id="saveBtn" title="Save current image position">SAVE POS</button>
                <button id="snapBtn">SNAP TO SAVED: (<span id="savedDisplay">-55.82, -404.67</span>)</button>
            </div>

            <div class="settings-grid">
                <div class="slider-box"><span>Alpha</span><input type="range" id="imgAlpha" min="0" max="1" step="0.05" value="0.5"></div>
                <div class="slider-box"><span>Scale</span><input type="range" id="imgScale" min="0.01" max="10" step="0.01" value="1"></div>
                
                <div class="check-row">
                    <label><input type="checkbox" id="gridToggle" checked> Grid</label>
                    <label title="Automatically snap to saved pos on render"><input type="checkbox" id="autoSnapOnRender" checked> Auto-Snap on Render</label>
                    <input type="file" id="imageLoader" accept="image/*" style="width: 75px;">
                </div>
            </div>
        </div>
    </div>
    
    <div id="viewport-container">
        <canvas id="tileCanvas"></canvas>
        <div id="coord-hud">
            <div class="hud-line"><span>MOUSE X:</span> <span id="mX">0.00</span></div>
            <div class="hud-line"><span>MOUSE Y:</span> <span id="mY">0.00</span></div>
            <div style="color: #00bcff; border-top: 1px solid #444; margin-top: 8px; padding-top: 8px;">
                <div class="hud-line"><span>IMG X:</span> <span id="imgX">-55.82</span></div>
                <div class="hud-line"><span>IMG Y:</span> <span id="imgY">-404.67</span></div>
                <div class="saved-coord">SAVED: <span id="savedVal">-55.82, -404.67</span></div>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('tileCanvas');
const ctx = canvas.getContext('2d');
const hud = { 
    mx: document.getElementById('mX'), my: document.getElementById('mY'), 
    ix: document.getElementById('imgX'), iy: document.getElementById('imgY'),
    saved: document.getElementById('savedVal'), display: document.getElementById('savedDisplay')
};

let tiles = [];
let camera = { x: 0, y: 0, zoom: 1 };
let overlayImg = null;

// The current working offset
let imgOffset = { x: -55.82, y: -404.67 };
// The saved preset
let savedOffset = { x: -55.82, y: -404.67 };

function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.translate(canvas.width / 2 + camera.x, canvas.height / 2 + camera.y);
    ctx.scale(camera.zoom, camera.zoom);

    if (overlayImg && overlayImg.complete) {
        ctx.save();
        ctx.globalAlpha = document.getElementById('imgAlpha').value;
        const s = parseFloat(document.getElementById('imgScale').value);
        ctx.translate(-imgOffset.x, -imgOffset.y); 
        ctx.scale(s, s);
        ctx.drawImage(overlayImg, -overlayImg.width/2, -overlayImg.height/2);
        ctx.restore();
    }

    if (document.getElementById('gridToggle').checked) {
        const range = 5000, step = 100;
        ctx.strokeStyle = "#333"; ctx.lineWidth = 1/camera.zoom;
        ctx.font = `${12/camera.zoom}px monospace`; ctx.fillStyle = "#666";
        for(let i = -range; i <= range; i += step) {
            ctx.beginPath(); ctx.moveTo(i, -range); ctx.lineTo(i, range); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-range, i); ctx.lineTo(range, i); ctx.stroke();
        }
        ctx.strokeStyle = "#ff444455"; ctx.beginPath(); ctx.moveTo(0,-range); ctx.lineTo(0,range); ctx.stroke();
        ctx.strokeStyle = "#4444ff55"; ctx.beginPath(); ctx.moveTo(-range,0); ctx.lineTo(range,0); ctx.stroke();
    }

    tiles.forEach((t, i) => {
        ctx.strokeStyle = `hsl(${(i * 45) % 360}, 85%, 65%)`;
        ctx.lineWidth = 4 / camera.zoom;
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        if (t.type === 's') {
            ctx.beginPath(); ctx.moveTo(t.p1.x, t.p1.y); ctx.lineTo(t.p2.x, t.p2.y); ctx.stroke();
        } else {
            const rad = Math.hypot(t.s.x - t.c.x, t.s.y - t.c.y);
            const sa = Math.atan2(t.s.y - t.c.y, t.s.x - t.c.x);
            const ea = Math.atan2(t.e.y - t.c.y, t.e.x - t.c.x);
            let diff = (ea - sa) % (Math.PI * 2); if (diff < 0) diff += Math.PI * 2;
            ctx.beginPath(); ctx.arc(t.c.x, t.c.y, rad, sa, ea, (t.r !== (diff > Math.PI))); ctx.stroke();
        }
    });
}

document.getElementById('saveBtn').onclick = () => {
    savedOffset = { ...imgOffset };
    const str = `${savedOffset.x.toFixed(2)}, ${savedOffset.y.toFixed(2)}`;
    hud.saved.innerText = str;
    hud.display.innerText = str;
};

document.getElementById('snapBtn').onclick = () => {
    imgOffset = { ...savedOffset };
    draw();
};

document.getElementById('renderBtn').onclick = () => {
    const rawText = document.getElementById('codeInput').value;
    tiles = [];
    
    const chunks = rawText.split(/new\s+(StraightTile|ArcTile)/g);
    for (let i = 1; i < chunks.length; i += 2) {
        const type = chunks[i], content = chunks[i+1];
        const vecRegex = /Vector2\s*\(\s*(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)\s*\)/g;
        const pts = []; let m;
        while ((m = vecRegex.exec(content)) !== null) pts.push({ x: parseFloat(m[1]), y: parseFloat(m[2]) });
        if (type === "StraightTile" && pts.length >= 2) tiles.push({ type:'s', p1:pts[0], p2:pts[1] });
        else if (type === "ArcTile" && pts.length >= 3) tiles.push({ type:'a', c:pts[0], s:pts[1], e:pts[2], r:content.toLowerCase().includes("reflex(true)") });
    }

    if (document.getElementById('autoSnapOnRender').checked) {
        imgOffset = { ...savedOffset };
    }
    draw();
};

document.getElementById('imageLoader').onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const url = URL.createObjectURL(file);
    const tempImg = new Image();
    tempImg.onload = () => { overlayImg = tempImg; draw(); URL.revokeObjectURL(url); };
    tempImg.src = url;
};

['imgAlpha', 'imgScale', 'gridToggle'].forEach(id => document.getElementById(id).oninput = draw);

let isDown = false, lastP = {x:0, y:0};
canvas.onmousedown = (e) => { isDown = true; lastP = {x:e.clientX, y:e.clientY}; };
window.onmouseup = () => isDown = false;
canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const wx = (e.clientX - rect.left - canvas.width/2 - camera.x) / camera.zoom;
    const wy = (e.clientY - rect.top - canvas.height/2 - camera.y) / camera.zoom;
    hud.mx.innerText = wx.toFixed(2); hud.my.innerText = wy.toFixed(2);
    hud.ix.innerText = imgOffset.x.toFixed(2); hud.iy.innerText = imgOffset.y.toFixed(2);

    if (isDown) {
        const dx = e.clientX - lastP.x, dy = e.clientY - lastP.y;
        if (e.shiftKey) { 
            imgOffset.x -= dx/camera.zoom; 
            imgOffset.y -= dy/camera.zoom; 
        } else { 
            camera.x += dx; camera.y += dy; 
        }
        lastP = {x:e.clientX, y:e.clientY};
        draw();
    }
};
canvas.onwheel = (e) => { camera.zoom *= (e.deltaY > 0 ? 0.9 : 1.1); draw(); e.preventDefault(); };
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight - 140; draw(); };
window.onresize();
</script>
</body>
</html>

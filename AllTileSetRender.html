<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Visualizer - AS3 & Custom JSON</title>
    <style>
        :root { --panel-bg: #2a2a2a; --accent: #4CAF50; --snap-blue: #007acc; --save-gold: #c9a01c; --edit-orange: #ff9800; --text: #eee; }
        body { background: #1a1a1a; color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .ui-panel { background: var(--panel-bg); padding: 12px; border-bottom: 2px solid #444; display: flex; gap: 15px; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        textarea { flex: 1; height: 140px; background: #111; color: #0f0; border: 1px solid #555; padding: 10px; font-family: 'Consolas', monospace; font-size: 11px; border-radius: 4px; resize: none; }
        
        .controls { display: flex; flex-direction: column; gap: 8px; min-width: 380px; }
        button { padding: 8px; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; color: white; transition: filter 0.2s; }
        button:hover { filter: brightness(1.2); }
        
        .row { display: flex; gap: 5px; }
        #renderBtn { background: var(--accent); flex: 1; }
        #editToggle { background: #444; flex: 1; border: 2px solid transparent; }
        #editToggle.active { background: var(--edit-orange); border-color: white; }
        
        #formatToggle { background: #555; font-size: 11px; min-width: 100px; }
        #saveBtn { background: var(--save-gold); flex: 1; }
        #snapBtn { background: var(--snap-blue); flex: 2; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #222; padding: 10px; border-radius: 4px; border: 1px solid #444; }
        .slider-box { display: flex; flex-direction: column; gap: 2px; font-size: 10px; color: #aaa; }
        .check-row { grid-column: span 2; display: flex; justify-content: space-between; font-size: 11px; align-items: center; border-top: 1px solid #333; padding-top: 5px;}
        
        #viewport-container { flex: 1; position: relative; background: #000; overflow: hidden; }
        canvas { display: block; cursor: crosshair; }
        
        #coord-hud { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.85); color: #0f0; padding: 15px; border-radius: 8px; border: 1px solid #444; font-family: monospace; font-size: 11px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <textarea id="codeInput" placeholder='{ "Nodes": [...], "Links": [...] } or AS3 Vector...'></textarea>
        
        <div class="controls">
            <div class="row">
                <button id="renderBtn">RENDER</button>
                <button id="editToggle">EDIT: OFF</button>
                <button id="formatToggle">MODE: JSON</button>
            </div>
            
            <div class="row">
                <button id="saveBtn">SAVE POS</button>
                <button id="snapBtn">SNAP (<span id="savedDisplay">-55.8</span>)</button>
            </div>

            <div class="settings-grid">
                <div class="slider-box"><span>Img Alpha</span><input type="range" id="imgAlpha" min="0" max="1" step="0.05" value="0.5"></div>
                <div class="slider-box"><span>Img Scale</span><input type="range" id="imgScale" min="0.01" max="10" step="0.01" value="1"></div>
                <div class="check-row">
                    <label><input type="checkbox" id="gridToggle" checked> Grid</label>
                    <input type="file" id="imageLoader" accept="image/*" style="width: 80px;">
                </div>
            </div>
        </div>
    </div>
    
    <div id="viewport-container">
        <canvas id="tileCanvas"></canvas>
        <div id="coord-hud">
            <div>X: <span id="mX">0</span> | Y: <span id="mY">0</span></div>
            <div id="editHint" style="color: var(--edit-orange); margin-top: 5px; display: none;">● DRAGGING POINT</div>
        </div>
    </div>

<script>
const canvas = document.getElementById('tileCanvas');
const ctx = canvas.getContext('2d');
const codeInput = document.getElementById('codeInput');
const editBtn = document.getElementById('editToggle');
const formatBtn = document.getElementById('formatToggle');

let nodes = []; // Internal store of point arrays
let links = [];
let camera = { x: 0, y: 0, zoom: 1 };
let overlayImg = null;
let imgOffset = { x: -55.82, y: -404.67 };
let savedOffset = { x: -55.82, y: -404.67 };

let isEditing = false;
let draggedPoint = null; // { nodeIdx, ptIdx }
let outputFormat = 'JSON'; 

formatBtn.onclick = () => {
    outputFormat = outputFormat === 'AS3' ? 'JSON' : 'AS3';
    formatBtn.innerText = `MODE: ${outputFormat}`;
    if (nodes.length > 0) updateCodeString();
};

editBtn.onclick = () => {
    isEditing = !isEditing;
    editBtn.classList.toggle('active', isEditing);
    editBtn.innerText = `EDIT: ${isEditing ? 'ON' : 'OFF'}`;
    document.getElementById('editHint').style.display = isEditing ? 'block' : 'none';
    draw();
};

function updateCodeString() {
    let output = "";
    if (outputFormat === 'JSON') {
        const jsonStruct = {
            Nodes: nodes.map(n => ({
                Points: n.Points.map(p => [parseFloat(p[0].toFixed(2)), parseFloat(p[1].toFixed(2))]),
                Flags: n.Flags || 0
            })),
            Links: links
        };
        output = JSON.stringify(jsonStruct, null, 4);
    } else {
        output = "new Vector.<Tile>([\n";
        nodes.forEach((n, i) => {
            // Simplified AS3 export (treating first 2 pts as Straight for legacy compat)
            const p1 = n.Points[0], p2 = n.Points[n.Points.length-1];
            output += `    new StraightTile(new Vector2(${p1[0].toFixed(2)}, ${p1[1].toFixed(2)}), new Vector2(${p2[0].toFixed(2)}, ${p2[1].toFixed(2)}))`;
            output += (i < nodes.length - 1) ? ",\n" : "\n";
        });
        output += "]);";
    }
    codeInput.value = output;
}

document.getElementById('renderBtn').onclick = () => {
    const rawText = codeInput.value.trim();
    if (!rawText) return;

    try {
        if (rawText.startsWith('{')) {
            const data = JSON.parse(rawText);
            nodes = data.Nodes || [];
            links = data.Links || [];
            outputFormat = 'JSON';
        } else {
            // Basic AS3 parser
            nodes = [];
            const chunks = rawText.split(/new\s+(StraightTile|ArcTile)/g);
            for (let i = 1; i < chunks.length; i += 2) {
                const content = chunks[i+1];
                const vecRegex = /Vector2\s*\(\s*(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)\s*\)/g;
                const pts = []; let m;
                while ((m = vecRegex.exec(content)) !== null) pts.push([parseFloat(m[1]), parseFloat(m[2])]);
                if (pts.length >= 2) nodes.push({ Points: pts, Flags: 1 });
            }
            outputFormat = 'AS3';
        }
        formatBtn.innerText = `MODE: ${outputFormat}`;
        draw();
    } catch (e) { alert("Error parsing format. Ensure JSON or AS3 structure is correct."); }
};

function draw() {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.translate(canvas.width / 2 + camera.x, canvas.height / 2 + camera.y);
    ctx.scale(camera.zoom, camera.zoom);

    if (overlayImg) {
        ctx.save();
        ctx.globalAlpha = document.getElementById('imgAlpha').value;
        const s = parseFloat(document.getElementById('imgScale').value);
        ctx.translate(-imgOffset.x, -imgOffset.y);
        ctx.scale(s, s);
        ctx.drawImage(overlayImg, -overlayImg.width/2, -overlayImg.height/2);
        ctx.restore();
    }

    if (document.getElementById('gridToggle').checked) {
        ctx.strokeStyle = "#333"; ctx.lineWidth = 1/camera.zoom;
        for(let i = -2000; i <= 2000; i += 100) {
            ctx.beginPath(); ctx.moveTo(i, -2000); ctx.lineTo(i, 2000); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-2000, i); ctx.lineTo(2000, i); ctx.stroke();
        }
    }

    nodes.forEach((n, nIdx) => {
        ctx.strokeStyle = isEditing ? '#888' : `hsl(${(nIdx * 40) % 360}, 70%, 60%)`;
        ctx.lineWidth = 3 / camera.zoom;
        
        ctx.beginPath();
        n.Points.forEach((p, pIdx) => {
            if(pIdx === 0) ctx.moveTo(p[0], p[1]);
            else ctx.lineTo(p[0], p[1]);
        });
        ctx.stroke();

        if (isEditing) {
            n.Points.forEach((p, pIdx) => {
                ctx.fillStyle = (pIdx === 0) ? '#0f0' : (pIdx === n.Points.length-1 ? '#f00' : '#ff9800');
                const s = 5 / camera.zoom;
                ctx.fillRect(p[0] - s, p[1] - s, s*2, s*2);
            });
        }
    });
}

let isDown = false, lastP = {x:0, y:0};
canvas.onmousedown = (e) => {
    isDown = true; lastP = {x:e.clientX, y:e.clientY};
    if (isEditing) {
        const rect = canvas.getBoundingClientRect();
        const wx = (e.clientX - rect.left - canvas.width/2 - camera.x) / camera.zoom;
        const wy = (e.clientY - rect.top - canvas.height/2 - camera.y) / camera.zoom;
        nodes.forEach((n, nIdx) => {
            n.Points.forEach((p, pIdx) => {
                if (Math.hypot(p[0] - wx, p[1] - wy) < 12/camera.zoom) draggedPoint = { nIdx, pIdx };
            });
        });
    }
};

window.onmouseup = () => { isDown = false; draggedPoint = null; };

canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const wx = (e.clientX - rect.left - canvas.width/2 - camera.x) / camera.zoom;
    const wy = (e.clientY - rect.top - canvas.height/2 - camera.y) / camera.zoom;
    document.getElementById('mX').innerText = Math.round(wx);
    document.getElementById('mY').innerText = Math.round(wy);

    if (isDown) {
        if (draggedPoint) {
            nodes[draggedPoint.nIdx].Points[draggedPoint.pIdx] = [wx, wy];
            updateCodeString();
        } else if (e.shiftKey) {
            imgOffset.x -= (e.clientX - lastP.x)/camera.zoom;
            imgOffset.y -= (e.clientY - lastP.y)/camera.zoom;
        } else {
            camera.x += (e.clientX - lastP.x);
            camera.y += (e.clientY - lastP.y);
        }
        lastP = {x:e.clientX, y:e.clientY};
        draw();
    }
};

canvas.onwheel = (e) => { camera.zoom *= (e.deltaY > 0 ? 0.9 : 1.1); draw(); e.preventDefault(); };
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight - 180; draw(); };
window.onresize();

document.getElementById('saveBtn').onclick = () => { savedOffset = { ...imgOffset }; document.getElementById('savedDisplay').innerText = savedOffset.x.toFixed(1); };
document.getElementById('snapBtn').onclick = () => { imgOffset = { ...savedOffset }; draw(); };
document.getElementById('imageLoader').onchange = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const url = URL.createObjectURL(file);
    const tempImg = new Image();
    tempImg.onload = () => { overlayImg = tempImg; draw(); URL.revokeObjectURL(url); };
    tempImg.src = url;
};
['imgAlpha', 'imgScale', 'gridToggle'].forEach(id => document.getElementById(id).oninput = draw);
</script>
</body>
</html>

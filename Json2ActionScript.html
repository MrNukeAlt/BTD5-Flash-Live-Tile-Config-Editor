<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JSON to ActionScript Vector Converter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #1e1e1e; color: #d4d4d4; }
        
        /* Container and Tab Styling */
        .main-container { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 0px; }
        .tabs { display: flex; gap: 5px; }
        .tab-btn { background: #252526; border: 1px solid #333; color: #888; padding: 10px 20px; border-radius: 8px 8px 0 0; cursor: pointer; text-decoration: none; font-size: 0.9rem; font-weight: bold; border-bottom: none; }
        .tab-btn.active { background: #1e1e1e; border-top: 2px solid #fd971f; color: #fd971f; }
        .tab-btn:hover { background: #2a2a2a; color: #fff; }

        /* Content Card */
        .converter-card { background: #1e1e1e; padding: 25px; border-radius: 0 12px 12px 12px; border: 1px solid #333; }
        
        textarea { width: 100%; height: 100px; background: #252526; color: #85c46c; border: 1px solid #3c3c3c; padding: 10px; box-sizing: border-box; font-family: monospace; }
        button { background: #007acc; color: white; border: none; padding: 12px 24px; cursor: pointer; margin: 15px 0; font-weight: bold; border-radius: 4px; }
        button:hover { background: #0062a3; }
        pre { background: #000; color: #9cdcfe; padding: 15px; border: 1px solid #3c3c3c; border-left: 4px solid #fd971f; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; font-size: 13px; }
        .label { margin-bottom: 8px; display: block; color: #569cd6; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        h2 { margin-top: 0; color: #fd971f; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="tabs">
        <a href="https://mrnukealt.github.io/BTD5-Flash-Live-Tile-Config-Editor/Website2.html" class="tab-btn">Config Editor</a>
        <div class="tab-btn active">JSON to ActionScript Converter</div>
    </div>

    <div class="converter-card">
        <h2>ActionScript TileSet Generator</h2>
        
        <span class="label">Paste JSON Object:</span>
        <textarea id="jsonInput">{ "type": "StraightTile", "start": { "x": 60, "y": 150 }, "end": { "x": 250, "y": 150 }, "nextIndices": [ 1, 2 ], "layer": 0, "reflex": false }</textarea>
        
        <button onclick="convertJSON()">Generate AS3 Code</button>

        <span class="label">Output:</span>
        <pre id="asOutput">Result will appear here...</pre>
    </div>
</div>

<script>
    function convertJSON() {
        const input = document.getElementById('jsonInput').value;
        const output = document.getElementById('asOutput');

        try {
            const data = JSON.parse(input);
            
            // Constructing the chained method string
            let code = `tileSets = Vector.<Vector.<Tile>>([Vector.<Tile>([\n    `;
            
            code += `new ${data.type}()`;
            
            // Handle Start Point
            if(data.start) {
                code += `.ini_startPoint(new Vector2(${data.start.x},${data.start.y}))`;
            }
            
            // Handle End Point
            if(data.end) {
                code += `.ini_endPoint(new Vector2(${data.end.x},${data.end.y}))`;
            }
            
            // Handle Next Indices (Typed Vector)
            if(data.nextIndices) {
                code += `.ini_nextTileIndices(Vector.<int>([${data.nextIndices.join(", ")}]))`;
            }
            
            // Handle Transition Type (Defaulting to 0 if not in JSON)
            const trans = data.transitionType !== undefined ? data.transitionType : 0;
            code += `.ini_transitionType(${trans})`;

            // Handle Layer
            if(data.layer !== undefined) {
                code += `.ini_layer(${data.layer})`;
            }

            // Handle Reflex (Specific to ArcTile usually)
            if(data.reflex !== undefined) {
                code += `.ini_reflex(${data.reflex})`;
            }

            code += `\n])]);`;

            output.textContent = code;
        } catch (e) {
            output.textContent = "Error parsing JSON: " + e.message;
        }
    }
</script>

</body>
</html>

</body>
</html>
